services:
  retrobreaker-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      # Environment variables for backend
      - NODE_ENV=production
      - PORT=3000
      # Database path (persistent volume)
      - DATABASE_PATH=/workspace/backend/data/retrobreaker.db
      # Secrets from Dokploy environment variables
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
    volumes:
      # Persist SQLite database
      - retrobreaker-data:/workspace/backend/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # API Routing
      - "traefik.http.routers.retrobreaker-api.rule=Host(`retrobreaker.requet.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.retrobreaker-api.entrypoints=websecure"
      - "traefik.http.routers.retrobreaker-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.retrobreaker-api.loadbalancer.server.port=3000"

  retrobreaker-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Backend API URL for the frontend (public HTTPS URL)
        EXPO_PUBLIC_API_URL: https://retrobreaker.requet.fr
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      retrobreaker-backend:
        condition: service_healthy
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Main Application Routing
      - "traefik.http.routers.retrobreaker-app.rule=Host(`retrobreaker.requet.fr`)"
      - "traefik.http.routers.retrobreaker-app.entrypoints=websecure"
      - "traefik.http.routers.retrobreaker-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.retrobreaker-app.loadbalancer.server.port=80"

volumes:
  retrobreaker-data:
    driver: local

networks:
  dokploy-network:
    external: true
